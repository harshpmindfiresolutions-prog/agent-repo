<!DOCTYPE html>
<!--
  Migration of users.cfm → app/templates/users.html

  Original ColdFusion users.cfm:
    - Session guard: <cfif NOT session.isLoggedIn> → <cflocation url="index.cfm">
    - Bootstrap form to add a user (name + email).
    - Client-side validation: name required; email required + regex pattern.
    - jQuery AJAX POST to "components/User.cfc?method=addUser".
    - jQuery AJAX GET  to "components/User.cfc?method=getUsers" to populate table.
    - ColdFusion query result shape: { DATA: [[id, name, email], ...] }

  Python/FastAPI equivalent:
    - Session guard enforced server-side in app/routers/users_page.py (GET /users).
    - AJAX POST → /components/users/addUser
    - AJAX GET  → /components/users/getUsers  (returns JSON array of objects)
    - Table rendering updated to match FastAPI response shape: [{id, name, email}, ...]
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h4>Add User</h4>
        <div id="userMessage"></div>

        <!-- Mirrors the <form id="userForm"> in users.cfm -->
        <form id="userForm" novalidate>
            <input type="text"  id="name"  name="name"
                   class="form-control mb-2" placeholder="Name">
            <input type="email" id="email" name="email"
                   class="form-control mb-2" placeholder="Email">
            <button class="btn btn-primary">Save</button>
        </form>

        <hr>
        <h4>User List</h4>
        <table class="table table-bordered" id="userTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <!-- Mirrors: <a href="dashboard.cfm" ...>Back</a> -->
        <a href="/dashboard" class="btn btn-secondary">Back</a>
    </div>
</div>

<script>
/*
 * loadUsers() mirrors the $.get("components/User.cfc?method=getUsers", ...) call.
 *
 * FastAPI returns a JSON array of objects: [{id, name, email}, ...]
 * Original ColdFusion returned: { DATA: [[id, name, email], ...] }
 * Table rendering updated accordingly.
 */
function loadUsers() {
    $.get("/components/users/getUsers", function(data) {
        var rows = "";
        data.forEach(function(u) {
            rows += "<tr><td>" + u.id + "</td><td>" + u.name + "</td><td>" + u.email + "</td></tr>";
        });
        $("#userTable tbody").html(rows);
    });
}

/*
 * Form submit handler mirrors the one in users.cfm.
 * Client-side validation is identical.
 * AJAX target updated from "components/User.cfc?method=addUser"
 *                       to  "/components/users/addUser"
 */
$("#userForm").submit(function(e) {
    e.preventDefault();

    let name   = $("#name").val().trim();
    let email  = $("#email").val().trim();
    let errors = [];

    // Validation – identical to original
    if (name === "") {
        errors.push("Name is required");
    }
    if (email === "") {
        errors.push("Email is required");
    } else {
        let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
            errors.push("Enter a valid email address");
        }
    }

    if (errors.length > 0) {
        $("#userMessage").html('<div class="alert alert-danger">' + errors.join("<br>") + '</div>');
        return;
    }

    // POST to FastAPI user router (replaces User.cfc?method=addUser)
    $.ajax({
        url:         "/components/users/addUser",
        type:        "POST",
        contentType: "application/json",
        data:        JSON.stringify({ name: name, email: email }),
        success: function() {
            loadUsers();
            $("#userForm")[0].reset();
            $("#userMessage").html('<div class="alert alert-success">User added successfully</div>');
        },
        error: function() {
            $("#userMessage").html('<div class="alert alert-danger">Failed to add user. Please try again.</div>');
        }
    });
});

// Load users on page ready – mirrors $(document).ready(function(){ loadUsers(); });
$(document).ready(function() {
    loadUsers();
});
</script>

</body>
</html>
