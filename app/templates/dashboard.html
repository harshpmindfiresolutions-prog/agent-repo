<!DOCTYPE html>
<!--
  Migration of dashboard.cfm → app/templates/dashboard.html

  Original ColdFusion dashboard.cfm:
    - Session guard: <cfif NOT session.isLoggedIn> → <cflocation url="index.cfm">
    - Renders a Bootstrap dashboard card.
    - "Manage Users" link → users.cfm
    - Logout button → jQuery AJAX POST to "components/Auth.cfc?method=logout"
      then redirects to index.cfm.

  Python/FastAPI equivalent:
    - Session guard enforced server-side in app/routers/dashboard.py (GET /dashboard).
    - "Manage Users" link → /users
    - Logout AJAX → POST /components/auth/logout then redirect to /.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3>Dashboard</h3>
        <!-- Mirrors: <a href="users.cfm" ...>Manage Users</a> -->
        <a href="/users" class="btn btn-success mt-3">Manage Users</a>
        <button id="logoutBtn" class="btn btn-danger mt-3">Logout</button>
    </div>
</div>

<script>
/*
 * Mirrors the jQuery logout handler in dashboard.cfm.
 * AJAX target updated from "components/Auth.cfc?method=logout"
 *                       to  "/components/auth/logout"
 * Redirect updated from "index.cfm" to "/".
 */
$("#logoutBtn").click(function() {
    $.ajax({
        url:  "/components/auth/logout",
        type: "POST",
        success: function() {
            window.location = "/";
        },
        error: function() {
            window.location = "/";   // redirect even on error
        }
    });
});
</script>

</body>
</html>
